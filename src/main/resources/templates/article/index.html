<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Blog - Articles</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-5">
    <h1 class="text-center mb-4">Blog</h1>

    <form th:action="@{/api/blog}" method="get" class="mb-4">
        <div class="row">
            <div class="col-md-3">
                <input type="text" name="searchId" class="form-control" placeholder="Search by ID"
                       th:value="${searchId}">
            </div>
            <div class="col-md-3">
                <input type="text" name="searchTitle" class="form-control" placeholder="Search by Title"
                       th:value="${searchTitle}">
            </div>
            <div class="col-md-3">
                <input type="text" name="searchAuthor" class="form-control" placeholder="Search by Author"
                       th:value="${searchAuthor}">
            </div>
            <div class="col-md-3">
                <button type="submit" class="btn btn-primary w-100">Search</button>
            </div>
        </div>
    </form>


    <div class="mb-3">
        <a href="/api/blog/create" class="btn btn-primary">Add New Article</a>
    </div>


    <div th:each="article : ${articles}" class="mb-4">
        <div class="card">
            <div class="card-header d-flex justify-content-between">
                <div>
                    <h5 class="card-title">
                        <span th:text="'ID: ' + ${article.id}">ID: 1</span> -
                        <span th:text="${article.title}">Titre de l'article</span>
                    </h5>
                    <p class="card-text text-muted">
                        <span th:text="'By ' + ${article.author}">By the author</span>
                    </p>
                </div>

                <div>
                    <a th:href="@{/api/blog/update(id=${article.id})}" class="btn btn-warning btn-sm">Edit</a>
                    <a th:href="@{/api/blog/delete(id=${article.id})}" class="btn btn-danger btn-sm">Delete</a>
                </div>
            </div>
            <div class="card-body">
                <p th:text="${article.content}"></p>
            </div>
            <div class="card-body">
                <h5>Commentaires</h5>
                <ul style="list-style-type:none " >
                    <li th:each="comment : ${comments}"
                        th:if="${comment.articleId} == ${article.id}">
                        <strong th:text="${comment.author}">Auteur</strong> :
                        <span th:text="${comment.content}">Contenu</span>
                    </li>
                </ul>
            </div>

        </div>

    </div>

</div>

</body>
</html>
