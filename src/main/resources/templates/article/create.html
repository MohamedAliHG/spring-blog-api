<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Article</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container my-4">
    <div class="row">
        <div class="col-md-8 mx-auto rounded border p-4">
            <h2 class="text-center mb-5">Ajouter un Article</h2>
            <form method="post" th:object="${ArticleToCreate}">
                <div class="row mb-3">
                    <label class="col-sm-4 col-form-label">Author</label>
                    <div class="col-sm-8">
                        <input type="text" class="form-control" th:field="${ArticleToCreate.author}">
                        <p th:if="${#fields.hasErrors('author')}"
                           th:errorclass="text-danger"
                           th:errors="${ArticleToCreate.author}"></p>
                    </div>


                </div>
                <div class="row mb-3">
                    <label class="col-sm-4 col-form-label">title</label>
                    <div class="col-sm-8">
                        <input type="text" class="form-control" th:field="${ArticleToCreate.title}">
                        <p th:if="${#fields.hasErrors('title')}"
                           th:errorclass="text-danger"
                           th:errors="${ArticleToCreate.title}"></p>
                    </div>

                </div>
                <div class="row mb-3">
                    <label class="col-sm-4 col-form-label">content</label>
                    <div class="col-sm-8">
                        <input type="text" class="form-control" th:field="${ArticleToCreate.content}">
                        <p th:if="${#fields.hasErrors('content')}"
                           th:errorclass="text-danger"
                           th:errors="${ArticleToCreate.content}"></p>
                    </div>

                </div>

                <div class="row">
                    <div class="offset-sm-4 col-sm-4 d-grid">
                        <button type="submit" class="btn btn-outline-primary">
                            Submit
                        </button>
                    </div>
                </div>
                <br>
                <div class="row">
                    <div class="offset-sm-4 col-sm-4 d-grid">

                        <a href="/api/blog" class="btn btn-outline-primary">Cancel</a>

                    </div>
                </div>


            </form>

        </div>
    </div>
</div>
</body>
</html>
